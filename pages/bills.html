<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bills - Ambika</title>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

<div id="menuOverlay"></div>

<div class="wrapper">

  <header class="navbar">
    <div class="navbar-container">

      <div class="left-navbar">
        <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>

        <div class="navbar-brand">
          <h1>Ambika</h1>
          <p class="desktop-text">Billing & Inventory System</p>
        </div>
      </div>

      <ul class="nav-menu" id="mobileMenu">
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="sales.html" class="nav-link">Sales</a></li>
        <li><a href="purchases.html" class="nav-link">Purchases</a></li>
        <li><a href="bills.html" class="nav-link active">Bills</a></li>
        <li><a href="reports.html" class="nav-link">Reports</a></li>
        <li><a href="inventory.html" class="nav-link">Inventory</a></li>
      </ul>

      <div class="profile-menu">
        <button class="profile-icon" onclick="toggleProfileMenu()">
         <img
  id="navbarProfileImage"
  src=""
  alt="Profile"
  onclick="toggleProfileMenu(event)"
>
        </button>
        <div id="profileDropdown" class="profile-dropdown"></div>
      </div>

    </div>
  </header>

  <main class="main-content">
    <div class="page-container">

      <h2 class="page-title">📄 Bills Management</h2>

      <p style="color:#94a3b8; margin-bottom:20px;">
        Bills are generated from your sales records.
      </p>

      <h3 class="section-title">📋 Recent Bills</h3>

      <div id="billsList" class="items-list">
        <div class="no-data">
          <div class="no-data-icon">📄</div>
          <p>No bills created yet</p>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>&copy; 2024 Ambika Billing System. All rights reserved.</p>
  </footer>

</div>

<script src="../assets/js/bills.js"></script>
<script src="../assets/js/auth.js"></script>

<!-- Profile Modal -->
<div id="profileModal" class="profile-modal">
  <div class="profile-modal-box">
    <button class="modal-close" onclick="closeProfile()">×</button>

    <h2>👤 My Profile</h2>

    <div style="text-align:center; margin-bottom:15px;">
      <img
        id="profilePreview"
        src=""
        alt="Profile Preview"
        style="
          width:90px;
          height:90px;
          border-radius:50%;
          object-fit:cover;
          border:2px solid #2563eb;
          margin-bottom:10px;
        "
      >
    </div>

    <label>Profile Image</label>
    <input
      type="file"
      id="profileImageInput"
      accept="image/*"
      onchange="uploadProfileImage(event)"
    >

    <label>Name</label>
    <input type="text" id="profileNameInput">

    <label>Email</label>
    <input type="email" id="profileEmailInput">

    <label>Mobile Number</label>
    <input type="text" id="profilePhoneInput" disabled>

    <label>Location</label>
    <input type="text" id="profileLocationInput">

    <button onclick="saveProfile()" class="btn btn-primary">
      Save Changes
    </button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="profile-modal">
  <div class="profile-modal-box">
    <button class="modal-close" onclick="closeSettings()">×</button>

    <h2>⚙️ Settings</h2>

    <label>Theme</label>
    <select id="themeSelect">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>

    <br><br>

    <label>Language</label>
    <select id="languageSelect">
      <option value="en">English</option>
      <option value="hi">Hindi</option>
    </select>

    <br><br>

    <label>
      <input type="checkbox" id="notificationToggle">
      Enable Notifications
    </label>
    <label>Company Name</label>
<input type="text" id="companyNameInput" placeholder="Company Name">

<label>GST Number</label>
<input type="text" id="companyGSTInput" placeholder="GST Number">
<label>Phone Number</label>
<input type="text" id="companyPhoneInput" placeholder="Company Phone Number">


<label>Address</label>
<textarea id="companyAddressInput" placeholder="Company Address"></textarea>

<br><br>

<button onclick="clearAllData()" class="btn btn-danger">
  Clear All Data
</button>

<br><br>

<p id="settingsMessage"
   style="
      display:none;
      text-align:center;
      font-weight:600;
      margin-bottom:10px;
   ">
</p>

<button onclick="saveSettings()" class="btn btn-primary">
  Save Settings
</button>
</body>
</html>
